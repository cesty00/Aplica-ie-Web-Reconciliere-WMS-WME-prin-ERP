services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reconciliation
      POSTGRES_USER: reconciliation
      POSTGRES_PASSWORD: reconciliation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://reconciliation:reconciliation@db:5432/reconciliation
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
